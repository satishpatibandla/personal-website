<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Blog posts by Satish Patibandla — thoughts on development, technology, and lifelong learning.">
    <title>Blog — Satish Patibandla</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">S<span>.</span>Patibandla</a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="index.html#about">About</a>
                <a href="index.html#skills">Skills</a>
                <a href="blog.html" class="active">Blog</a>
                <a href="resources.html">Resources</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="nav-overlay" id="navOverlay"></div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1 class="section-title">Blog</h1>
            <p class="section-subtitle">Thoughts, tutorials, and insights on development, technology, and beyond.</p>
        </div>
    </div>

    <!-- Blog Content -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <!-- Filters -->
            <div class="blog-filters" id="blogFilters">
                <button class="filter-btn active" data-filter="all">All Posts</button>
            </div>

            <!-- Blog Grid -->
            <div class="blog-grid" id="blogGrid">
                <!-- Blog cards will be dynamically injected by blog.js -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="blogEmpty" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <h3>No posts yet</h3>
                <p>Blog posts will appear here once published. Check back soon!</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                © 2026 <span>Satish Patibandla</span>. All rights reserved.
            </p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>
</body>

</html>
